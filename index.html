<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Job Agent Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>AI Job Agent Dashboard</h1>
      <p>Search market jobs, tailor your resume with ATS insights, and track applications.</p>
    </header>

    <main class="layout">
      <section class="card" id="jobs">
        <h2>1) Look for jobs in the market</h2>
        <div class="search-row">
          <input id="jobQuery" type="text" placeholder="Search by title, company, skill, or location" />
          <button id="searchButton">Search</button>
        </div>
        <ul id="jobResults" class="job-list"></ul>
      </section>

      <section class="card" id="resume">
        <h2>2) Upload resume</h2>
        <input type="file" id="resumeUpload" accept=".txt,.md,.pdf,.doc,.docx" />
        <p id="resumeStatus" class="hint">Upload a resume file to analyze ATS match.</p>
      </section>

      <section class="card" id="ats">
        <h2>3) ATS-friendly tailoring</h2>
        <label for="jobDescription">Job description</label>
        <textarea id="jobDescription" rows="8" placeholder="Paste the full job description here..."></textarea>
        <button id="analyzeButton">Analyze ATS Match</button>
        <div id="atsOutput" class="ats-output"></div>
      </section>

      <section class="card" id="tracker">
        <h2>4) Application tracker</h2>
        <form id="applicationForm" class="grid-form">
          <input id="companyInput" placeholder="Company" required />
          <input id="roleInput" placeholder="Role" required />
          <select id="statusInput" required>
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
          <input id="dateInput" type="date" required />
          <button type="submit">Add Application</button>
        </form>

        <table>
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="applicationsBody"></tbody>
        </table>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
